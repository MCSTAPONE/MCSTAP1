<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Test Case</title>

    <link rel="stylesheet" href="static/css/pm.css">
</head>
<body>

<div class="header">

    Edit Test Case

</div>

<a href="/test-cases" class="back-btn">
    ← Back to Test Cases
</a>

<div class="table-container">

    <form method="post">

        <input
            type="text"
            name="title"
            value="{{ row[1] }}"
            required>

        <br><br>

        <input
            type="text"
            name="module"
            value="{{ row[2] }}">

        <br><br>

        <input
            type="text"
            name="scenario"
            value="{{ row[5] }}">

        <br><br>

        <input
            type="text"
            name="transaction_code"
            value="{{ row[6] }}">

        <br><br>

        <textarea
            name="process_step">{{ row[7] }}</textarea>

        <br><br>

        <button
            class="back-btn"
            type="submit">

            Save Changes

        </button>

    </form>

</div>

</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Flow</title>

    <link rel="stylesheet" href="/static/css/pm.css">
</head>

<body>

<div class="header">
    <h1>Create New Flow</h1>
</div>

<div class="container">
		<a href="/flow-library" class="back-btn">
            ← Flow Library
        </a>
		
	<form method="post">

        <label>
            Flow Name
        </label>

        <br>

        <input
            type="text"
            name="flow_name"
            required>

        <br><br>

        <label>
            Description
        </label>

        <br>

        <textarea
            name="description"
            rows="4"
            cols="60">
        </textarea>

        <br><br>

        <label>
			Module
		</label>

		<br>

		<select
			name="module"
			required>

			<option value="">
				Select Module
			</option>

			<option value="PM">
				Plant Maintenance (PM)
			</option>

			<option value="MM">
				Material Management (MM)
			</option>

			<option value="CO">
				Controlling (CO)
			</option>

			<option value="FI">
				Finance (FI)
			</option>

			<option value="SD">
				Sales & Distribution (SD)
			</option>

			<option value="PP">
				Production Planning (PP)
			</option>

			<option value="QM">
				Quality Management (QM)
			</option>

			<option value="WM">
				Warehouse Management (WM)
			</option>
			
			<option value="TR">
				Tresury (TR)
			</option>
			
			<option value="LO">
				Logistic (LO)
			</option>
			
			<option value="PLM">
				Product Lifecycle Management (PLM)
			</option>
			
			<option value="SCM">
				Supply Chain Management (SCM)
			</option>
			
			<option value="PROC">
				Procurment (PROC)
			</option>
			
			<option value="E2E">
				End To End (E2E)
			</option>

		</select>
        <br><br>

        <button
            type="submit"
            class="back-btn">

            Save Flow

        </button>

    </form>

</div>

</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Test Repository</title>

    <link rel="stylesheet" href="static/css/pm.css">
</head>

<body>

<div class="header">

    Test Repository

</div>

<a href="/dashboard" class="back-btn">
		← Dashboard
</a>

<div class="section">

    <h2>Repository Modules</h2>

    <div class="tiles">

        {% for module in modules %}

        <a href="/repository/{{ module }}" class="tile-link">
            <div class="tile">

                <div class="tile-title">
                    {{ module }}
                </div>

                <div class="tile-desc">
                    Repository Assets
                </div>

            </div>
        </a>

        {% endfor %}

    </div>

</div>

</body>

</html>

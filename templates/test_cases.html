<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Test Case Management</title>

    <link rel="stylesheet" href="/static/css/pm.css">
</head>

<body>

    <div class="header">
        Test Case Management
    </div>

    <a href="/dashboard" class="back-btn">
		← Dashboard
	</a>

    <div class="table-container">

        <h2>Create New Test Case</h2>

        <form action="/test-cases/save" method="POST">

            <input
                type="text"
                name="title"
                placeholder="Title"
                required>

            <br><br>

            <select name="module">

                <option value="">Select Module</option>
                <option value="PM">PM</option>
                <option value="MM">MM</option>
                <option value="FI">FI</option>
                <option value="CO">CO</option>
                <option value="SD">SD</option>
                <option value="WM">WM</option>
                <option value="QM">QM</option>
                <option value="PP">PP</option>
                <option value="SCM">SCM</option>
                <option value="LO">LO</option>
                <option value="TR">TR</option>
		    <option value="PLM">PLM</option>
		    <option value="PROC">PROC</option>
		    <option value="E2E">E2E</option>

            </select>

            <br><br>

            <input
                type="text"
                name="transaction_code"
                placeholder="Transaction Code">

            <br><br>
			
            <textarea
                name="process_step"
                placeholder="Process Step"></textarea>

            <br><br>

            <select name="automation_status">

                <option value="Manual">Manual</option>
                <option value="Automated">Automated</option>

            </select>

            <br><br>
			Automation Script

			<input
				type="text"
				name="script_path">
				
			<br><br>

            <button
                type="submit"
                class="back-btn">

                Save Test Case

            </button>

        </form>

    </div>

    <div class="table-container">

        <h2>Available Test Cases</h2>

        <div style="margin-bottom:20px;">

            <input
                type="text"
                id="searchInput"
                placeholder="Search Test Cases..."
                style="padding:8px;width:300px;">

            <select
                id="moduleFilter"
                style="padding:8px;margin-left:10px;">

                <option value="">
                    All Modules
                </option>

                <option value="PM">PM</option>
                <option value="MM">MM</option>
                <option value="FI">FI</option>
                <option value="CO">CO</option>
                <option value="SD">SD</option>
                <option value="WM">WM</option>
                <option value="QM">QM</option>
                <option value="PP">PP</option>
                <option value="SCM">SCM</option>
                <option value="LO">LO</option>
                <option value="TR">TR</option>
		    <option value="PLM">PLM</option>
		    <option value="PROC">PROC</option>
		    <option value="E2E">E2E</option>

            </select>

        </div>

        <table class="test-table">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Module</th>
                    <th>Transaction</th>
                    <th>Process Step</th>
                     <th>Status</th>
					 <th>Automation Script</th>
                    <th style="width:140px;">
                        Actions
                    </th>

                </tr>

            </thead>

            <tbody id="testCaseTable">

                {% for row in rows %}

                <tr>

                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[3] }}</td>
                    <td>{{ row[4] }}</td>
					<td>{{ row[5] }}</td>



                   <td class="action-cell">

						<!-- View -->
						<a href="/test-cases/view/{{ row[0] }}"
						   class="action-icon"
						   title="View">
							👁️
						</a>

						<!-- Edit -->
						<a href="/test-cases/edit/{{ row[0] }}"
						   class="action-icon"
						   title="Edit">
							✏️
						</a>

						<!-- Delete -->
						<a href="/test-cases/delete/{{ row[0] }}"
						   class="action-icon"
						   title="Delete"
						   onclick="return confirm('Are you sure you want to delete this test case?');">
							🗑️
						</a>

					</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

<script>

const searchInput =
    document.getElementById("searchInput");

const moduleFilter =
    document.getElementById("moduleFilter");

function filterTable() {

    const searchValue =
        searchInput.value.toLowerCase();

    const selectedModule =
        moduleFilter.value;

    const rows =
        document.querySelectorAll(
            "#testCaseTable tr"
        );

    rows.forEach(row => {

        const text =
            row.innerText.toLowerCase();

        const module =
            row.children[1]?.innerText;

        const searchMatch =
            text.includes(searchValue);

        const moduleMatch =
            selectedModule === "" ||
            module === selectedModule;

        row.style.display =
            searchMatch && moduleMatch
                ? ""
                : "none";

    });

}

searchInput.addEventListener(
    "keyup",
    filterTable
);

moduleFilter.addEventListener(
    "change",
    filterTable
);

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>{{ module }} Repository</title>


</head>

<body>

<div class="header">

    {{ module }} Repository

</div>

	<a href="/repository" class="back-btn">
			← Repository
	</a>

    <div class="table-container">

        <h2>Repository Assets</h2>

        <table class="test-table">

            <thead>

                <tr>

                    <th>Test Case ID</th>

                    <th>Title</th>

                    <th>Transaction</th>

                    <th>Status</th>

                    <th>Automation Script</th>

                </tr>

            </thead>

            <tbody>

                {% for row in rows %}

                <tr>

                    <td>{{ row[0] }}</td>

                    <td>{{ row[1] }}</td>

                    <td>{{ row[2] }}</td>

                    <td>{{ row[3] }}</td>

                    <td>{{ row[4] }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</body>

</html>
